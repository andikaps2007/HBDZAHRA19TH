<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HBD RR Zahra Nur Mazidah</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css" />
    
    <style>
        :root {
            --cyber-cyan: #00f2ff;
            --cyber-pink: #ff00c8;
        }

        body {
            background-color: #050505;
            color: var(--cyber-cyan);
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            /* Memastikan sentuhan tidak mengganggu scroll default saat tidak zoom */
            touch-action: pan-x pan-y;
        }

        /* Lock Desktop Mode - Opsional: Hapus jika ingin bisa dibuka di PC */
        @media (min-width: 768px) {
            body::before {
                content: "MAAF, AKSES HANYA TERSEDIA PADA PERANGKAT MOBILE (HANDPHONE)";
                position: fixed;
                inset: 0;
                background: black;
                z-index: 9999;
                display: flex;
                justify-content: center;
                align-items: center;
                text-align: center;
                padding: 20px;
                color: var(--cyber-pink);
            }
        }

        .container {
            text-align: center;
            border: 2px solid var(--cyber-cyan);
            padding: 30px;
            background: rgba(0, 0, 0, 0.9);
            box-shadow: 0 0 20px var(--cyber-cyan);
            clip-path: polygon(0 15%, 5% 0, 100% 0, 100% 85%, 95% 100%, 0 100%);
            width: 85%;
        }

        h1 { font-size: 1rem; line-height: 1.8; white-space: pre-line; margin-bottom: 20px; }

        #countdown { display: flex; gap: 10px; justify-content: center; }
        .time-box { display: flex; flex-direction: column; align-items: center; min-width: 65px; }
        .number { font-size: 2.5rem; font-weight: 700; text-shadow: 0 0 15px var(--cyber-cyan); }
        .label { font-size: 0.6rem; color: var(--cyber-pink); text-transform: uppercase; }

        #btn-lanjut {
            display: none;
            margin-top: 30px;
            background: transparent;
            border: 2px solid var(--cyber-pink);
            color: var(--cyber-pink);
            padding: 15px 30px;
            font-family: 'Orbitron', sans-serif;
            cursor: pointer;
            box-shadow: 0 0 10px var(--cyber-pink);
            text-transform: uppercase;
            font-weight: bold;
        }

        #book-container {
            display: none;
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0; left: 0;
            background: #000;
        }

        .swiper { width: 100%; height: 100%; }
        .swiper-slide {
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* Container khusus Zoom Swiper */
        .swiper-zoom-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .swiper-slide img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }

        .hint-text {
            position: fixed;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: white;
            font-size: 0.7rem;
            z-index: 10;
            opacity: 0.6;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="countdown-screen" class="container">
        <h1>COUNTDOWN HAPPY BIRTHDAY
        RR ZAHRA NUR MAZIDAH 19 TH</h1>
        
        <div id="countdown">
            <div class="time-box"><span class="number" id="days">00</span><span class="label">Days</span></div>
            <div class="time-box"><span class="number" id="hours">00</span><span class="label">Hours</span></div>
            <div class="time-box"><span class="number" id="minutes">00</span><span class="label">Mins</span></div>
            <div class="time-box"><span class="number" id="seconds">00</span><span class="label">Secs</span></div>
        </div>

        <button id="btn-lanjut" onclick="bukaBuku()">LANJUT SISTEM</button>
    </div>

    <div id="book-container">
        <div class="swiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><div class="swiper-zoom-container"><img src="1.png"></div></div>
                <div class="swiper-slide"><div class="swiper-zoom-container"><img src="2.png"></div></div>
                <div class="swiper-slide"><div class="swiper-zoom-container"><img src="3.png"></div></div>
                <div class="swiper-slide"><div class="swiper-zoom-container"><img src="4.png"></div></div>
                <div class="swiper-slide"><div class="swiper-zoom-container"><img src="5.png"></div></div>
                <div class="swiper-slide"><div class="swiper-zoom-container"><img src="6.png"></div></div>
            </div>
            <div class="hint-text">
                Geser untuk halaman baru • Cubit untuk Zoom
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script>
        // Target: 24 Maret 2026 jam 23:59:59
        const targetDate = new Date(2026, 2, 24, 23, 59, 59).getTime();

        function update() {
            const now = new Date().getTime();
            const diff = targetDate - now;

            if (diff <= 0) {
                document.getElementById("countdown").style.display = "none";
                document.querySelector("h1").innerText = "SISTEM SIAP\nAKSES DIBERIKAN";
                document.getElementById("btn-lanjut").style.display = "inline-block";
                return;
            }

            const d = Math.floor(diff / (1000 * 60 * 60 * 24));
            const h = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
            const m = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
            const s = Math.floor((diff % (1000 * 60)) / 1000);

            document.getElementById("days").innerText = d.toString().padStart(2, '0');
            document.getElementById("hours").innerText = h.toString().padStart(2, '0');
            document.getElementById("minutes").innerText = m.toString().padStart(2, '0');
            document.getElementById("seconds").innerText = s.toString().padStart(2, '0');
        }

        setInterval(update, 1000);
        update();

        function bukaBuku() {
            document.getElementById("countdown-screen").style.display = "none";
            document.getElementById("book-container").style.display = "block";
            
            const swiper = new Swiper('.swiper', {
                // Aktifkan Fitur Zoom
                zoom: {
                    maxRatio: 3,
                    minRatio: 1,
                },
                effect: 'creative',
                creativeEffect: {
                    prev: { shadow: true, translate: [0, 0, -400] },
                    next: { translate: ['100%', 0, 0] },
                },
                speed: 800,
                grabCursor: true,
            });
        }
    </script>
</body>
</html>
